version: '3'

services:

  emscripten-builder:
    # user: "${UID:-0}:${GID:-0}"
    image: seanmorris/php-emscripten-builder
    build:
      context: ./
      dockerfile: emscripten-builder.dockerfile
    environment:
      EMCC_CORES: 8
      ENVIRONMENT: ${ENVIRONMENT:-web}
    volumes:
      - ${HOST_PROJECT_ROOT:-.}:/src
      - /tmp/emsdk-cache:/emsdk/upstream/emscripten/cache/
      - ${HOST_PROJECT_ROOT:-.}/.cache:/emsdk_portable/.data/cache/asmjs/
    command: [bash]
