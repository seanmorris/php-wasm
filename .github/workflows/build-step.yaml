name: Build Step

on:
  workflow_call:
    inputs:
      phpVersion:
        required: true
        type: string
      libType:
        required: true
        type: string

jobs:
  build-targets:
    name: Build PHP ${{ inputs.phpVersion }} w/${{ inputs.libType }} libs (${{ matrix.target.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: PHP For Node
            slug: node-mjs
            command: time make --debug=basic node-mjs
            needsDemoNode: true
          - name: PHP for Web & PHP-CGI for Worker
            slug: web-worker-cgi-mjs
            command: time make --debug=basic web-mjs worker-cgi-mjs
            needsDemoNode: false
          - name: PHP CGI for Node
            slug: node-cgi-mjs
            command: time make --debug=basic node-cgi-mjs
            needsDemoNode: true
          - name: PHP CLI for Node
            slug: node-cli-mjs
            command: time make --debug=basic node-cli-mjs
            needsDemoNode: true
          - name: PHP DBG for Node
            slug: node-dbg-mjs
            command: time make --debug=basic node-dbg-mjs
            needsDemoNode: true
          - name: PHP CLI for Web
            slug: web-cli-mjs
            command: time make --debug=basic web-cli-mjs
            needsDemoNode: false
          - name: PHP DBG for Web
            slug: web-dbg-mjs
            command: time make --debug=basic web-dbg-mjs
            needsDemoNode: false
          - name: PHP (sdl variant) for Web
            slug: web-mjs-sdl
            command: time make --debug=basic web-mjs WITH_SDL=1
            needsDemoNode: false
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Import `.env` file
        run: |
          cp -p .github/.env_${{ inputs.phpVersion }}.${{ inputs.libType }}.ci .env
          touch -d '1970-01-01 00:00:00 UTC' .env

      - name: Flatten mtimes
        run: find . -type f -print0 | xargs -0 touch -d '1970-01-01 00:00:00 UTC'

      - name: Disable man-db auto-update
        run: |
          echo "set man-db/auto-update false" | sudo debconf-communicate
          sudo dpkg-reconfigure man-db

      - name: Download Artifact
        if: ${{ inputs.libType != 'static' }}
        uses: actions/download-artifact@v8
        with:
          pattern: php-dependencies-*
          merge-multiple: true
          path: ./

      - name: Extract Artifact
        if: ${{ inputs.libType != 'static' }}
        run: |
          for TAR in php-dependencies-*.tar.gz; do
            tar -xzf ${TAR}
          done;

      - name: Re-flatten mtimes after extraction
        if: ${{ inputs.libType != 'static' }}
        run: find . \( -name node_modules -o -name .git \) -type d -prune -o -type f -print0 | xargs -0 touch -d '1970-01-01 00:00:00 UTC'

      - name: Apply executable cache
        if: ${{ inputs.libType != 'static' }}
        run: |
          shopt -s nullglob
          for CACHE in ./.cache/executables-*; do
            xargs -r -a "${CACHE}" chmod +x
          done

      - name: Install NPM packages
        run: npm ci

      - name: Install deps
        run: sudo apt update && sudo apt install coreutils docker-compose -y

      - name: Cache Docker image
        id: cache-docker-image
        uses: actions/cache@v5
        with:
          path: /tmp/builder-image.tar
          key: ${{ runner.os }}-docker-${{ hashFiles('emscripten-builder.dockerfile') }}

      - name: Load builder image if cached
        if: steps.cache-docker-image.outputs.cache-hit == 'true'
        run: docker load -i /tmp/builder-image.tar && rm -rf /tmp/builder-image.tar

      - name: Create builder image (if not cached)
        if: steps.cache-docker-image.outputs.cache-hit != 'true'
        run: |
          time make --debug=basic image
          docker save -o /tmp/builder-image.tar seanmorris/php-emscripten-builder:latest

      - name: Spin up docker-network
        run: docker network create phpwasm_default

      - name: Build demo-node
        if: ${{ matrix.target.needsDemoNode }}
        run: npm install --prefix demo-node

      - name: Build ${{ matrix.target.name }}
        run: ${{ matrix.target.command }}

      - name: Take Snapshot
        run: |
          sudo chown -R ${USER}:${USER} .
          sudo chmod -R u+rwX,go+rX .
          tar --exclude=.git \
            --format=posix \
            --exclude='php-uncompressed-fragment-${{ inputs.phpVersion }}-${{ inputs.libType }}-${{ matrix.target.slug }}.tar.gz' \
            --ignore-failed-read \
            --warning=no-file-changed \
            -czf 'php-uncompressed-fragment-${{ inputs.phpVersion }}-${{ inputs.libType }}-${{ matrix.target.slug }}.tar.gz' \
              third_party \
              packages \
              .cache \
              lib

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: php-uncompressed-fragment-${{ inputs.phpVersion }}-${{ inputs.libType }}-${{ matrix.target.slug }}
          path: php-uncompressed-fragment-${{ inputs.phpVersion }}-${{ inputs.libType }}-${{ matrix.target.slug }}.tar.gz
          compression-level: 0

      - name: Take Failure Snapshot
        if: ${{ failure() }}
        run: |
          sudo chown -R ${USER}:${USER} .
          sudo chmod -R u+rwX,go+rX .
          tar --exclude=.git --exclude='snapshot.tar.gz' --ignore-failed-read --warning=no-file-changed -czf snapshot.tar.gz .

      - name: Upload Failure Artifact
        uses: actions/upload-artifact@v6
        if: ${{ failure() }}
        with:
          name: failure-snapshot-${{ inputs.phpVersion }}-${{ inputs.libType }}-${{ matrix.target.slug }}
          path: snapshot.tar.gz
          compression-level: 0

  assemble:
    name: Assemble PHP ${{ inputs.phpVersion }} w/${{ inputs.libType }} libs
    runs-on: ubuntu-latest
    needs: [build-targets]
    steps:
      - name: Download build fragments
        uses: actions/download-artifact@v8
        with:
          pattern: php-uncompressed-fragment-${{ inputs.phpVersion }}-${{ inputs.libType }}-*
          merge-multiple: true
          path: ./

      - name: Extract build fragments
        run: |
          shopt -s nullglob
          for TAR in php-uncompressed-fragment-${{ inputs.phpVersion }}-${{ inputs.libType }}-*.tar.gz; do
            tar -xzf "${TAR}"
          done

      - name: Re-flatten mtimes after extraction
        run: find . \( -name node_modules -o -name .git \) -type d -prune -o -type f -print0 | xargs -0 touch -d '1970-01-01 00:00:00 UTC'

      - name: Take Snapshot
        run: |
          sudo chown -R ${USER}:${USER} .
          sudo chmod -R u+rwX,go+rX .
          tar --exclude=.git \
            --format=posix \
            --exclude='php-uncompressed-${{ inputs.phpVersion }}-${{ inputs.libType }}.tar.gz' \
            --ignore-failed-read \
            --warning=no-file-changed \
            -czf 'php-uncompressed-${{ inputs.phpVersion }}-${{ inputs.libType }}.tar.gz' \
              third_party \
              packages \
              .cache \
              lib

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: php-uncompressed-${{ inputs.phpVersion }}-${{ inputs.libType }}
          path: php-uncompressed-${{ inputs.phpVersion }}-${{ inputs.libType }}.tar.gz
          compression-level: 0

      - name: Take Failure Snapshot
        if: ${{ failure() }}
        run: |
          sudo chown -R ${USER}:${USER} .
          sudo chmod -R u+rwX,go+rX .
          tar --exclude=.git --exclude='snapshot.tar.gz' --ignore-failed-read --warning=no-file-changed -czf snapshot.tar.gz .

      - name: Upload Failure Artifact
        uses: actions/upload-artifact@v6
        if: ${{ failure() }}
        with:
          name: failure-snapshot-${{ inputs.phpVersion }}-${{ inputs.libType }}
          path: snapshot.tar.gz
          compression-level: 0
